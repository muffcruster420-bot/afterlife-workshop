name: Shangraw Gap CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile core scripts
        run: |
          python -m py_compile run_shangraw_gap.py
          python -m py_compile analyze_transition.py
          python -m py_compile real_bicoherence.py

      - name: Test Gap on synthetic data
        run: |
          python quick_test.py
