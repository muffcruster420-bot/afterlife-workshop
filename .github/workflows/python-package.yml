name: Shangraw Gap CI

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install wfdb numpy scipy

      - name: Run Shangraw Gap quick test
        run: python quick_test.py
