name: Shangraw Gap CI

on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install wfdb numpy scipy pytest pyedflib
      - run: python quick_test.py
      - run: pytest -s -v test_bicoherence.py
