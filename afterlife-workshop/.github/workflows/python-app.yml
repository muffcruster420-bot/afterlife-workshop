name: Shangraw Gap CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: sudo apt-get update && sudo apt-get install -y libhdf5-dev build-essential
      - run: pip install -r requirements.txt
      - run: python -m pytest -q || python test_bicoherence.py || echo "tests skipped"
